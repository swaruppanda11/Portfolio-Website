<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 18px; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #fff;
    }

    canvas { display: block; }

    /* Vignette overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 38%, rgba(0,0,0,0.78) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 3;
    }

    /* Viewport frame */
    #frame {
      position: fixed;
      inset: 18px;
      border: 1px solid #111;
      pointer-events: none;
      z-index: 9;
    }
    /* Corner ticks */
    #frame::before, #frame::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
    }
    #frame::before {
      top: -1px; left: -1px;
      border-top: 1px solid #333; border-left: 1px solid #333;
    }
    #frame::after {
      bottom: -1px; right: -1px;
      border-bottom: 1px solid #333; border-right: 1px solid #333;
    }

    /* HUD text */
    .hud {
      position: fixed;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: #555;
      z-index: 11;
      pointer-events: none;
      line-height: 1.8;
    }
    #hud-tl { top: 30px; left: 30px; }
    #hud-tr { top: 30px; right: 30px; text-align: right; }
    #hud-bl { bottom: 30px; left: 30px; }
    #hud-br { bottom: 30px; right: 30px; text-align: right; }

    /* Hero */
    #hero {
      position: fixed;
      top: 52px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease 0.3s;
    }
    #hero.visible { opacity: 1; }
    #hero h1 {
      font-family: 'Orbitron', 'Courier New', monospace;
      font-size: clamp(1.9rem, 4.5vw, 3.2rem);
      font-weight: 400;
      letter-spacing: 0.45em;
      text-indent: 0.45em;
    }
    #hero p {
      margin-top: 10px;
      font-size: 0.72rem;
      letter-spacing: 0.3em;
      color: #666;
    }

    /* Hint */
    #hint {
      position: fixed;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: #555;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.5s;
      animation: blink 3.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Labels */
    #labels {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 6;
    }
    .obj-label {
      position: absolute;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: #555;
      transform: translate(-50%, 0);
      transition: color 0.25s, opacity 0.25s;
      white-space: nowrap;
    }
    .obj-label.active { color: #ddd; }

    /* Targeting brackets */
    #target {
      position: fixed;
      pointer-events: none;
      z-index: 8;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #target.show { opacity: 1; }
    .brk {
      position: absolute;
      width: 13px;
      height: 13px;
    }
    .brk-tl { top:0; left:0;
      border-top: 1px solid rgba(255,255,255,0.45);
      border-left: 1px solid rgba(255,255,255,0.45); }
    .brk-tr { top:0; right:0;
      border-top: 1px solid rgba(255,255,255,0.45);
      border-right: 1px solid rgba(255,255,255,0.45); }
    .brk-bl { bottom:0; left:0;
      border-bottom: 1px solid rgba(255,255,255,0.45);
      border-left: 1px solid rgba(255,255,255,0.45); }
    .brk-br { bottom:0; right:0;
      border-bottom: 1px solid rgba(255,255,255,0.45);
      border-right: 1px solid rgba(255,255,255,0.45); }
    #target-lbl {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.35);
      white-space: nowrap;
      animation: blink 1.4s ease-in-out infinite;
    }

    /* Panel */
    #panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.93);
      width: 520px;
      max-width: 92vw;
      max-height: 78vh;
      overflow-y: auto;
      background: rgba(2, 2, 2, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid #1a1a1a;
      padding: 48px 44px 44px;
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #panel.open {
      opacity: 1;
      pointer-events: all;
      transform: translate(-50%, -50%) scale(1);
    }
    /* Panel top accent line */
    #panel-accent {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, #333, transparent);
    }
    #panel-title {
      font-size: 0.78rem;
      letter-spacing: 0.42em;
      margin-bottom: 34px;
      color: #bbb;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    #panel-title::before {
      content: '';
      display: inline-block;
      width: 16px;
      height: 1px;
      background: #444;
      flex-shrink: 0;
    }
    #panel-body { font-size: 0.9rem; line-height: 2; color: #777; }
    #close-btn {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: #555;
      cursor: pointer;
      user-select: none;
      transition: color 0.2s;
    }
    #close-btn:hover { color: #fff; }

    /* Scrollbar */
    #panel::-webkit-scrollbar { width: 1px; }
    #panel::-webkit-scrollbar-track { background: transparent; }
    #panel::-webkit-scrollbar-thumb { background: #1e1e1e; }

    /* Skill bars */
    .skill-row {
      display: grid;
      grid-template-columns: 110px 1fr 34px;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }
    .skill-name { color: #777; font-size: 0.78rem; letter-spacing: 0.08em; }
    .bar-track { height: 1px; background: #1e1e1e; }
    .bar-fill {
      height: 1px;
      background: #fff;
      width: 0;
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
    }
    .skill-pct { font-size: 0.65rem; color: #555; text-align: right; }

    /* Projects */
    .project {
      border-top: 1px solid #0d0d0d;
      padding: 22px 0;
    }
    .project:first-child { border-top: none; padding-top: 0; }
    .proj-num { font-size: 0.65rem; color: #555; letter-spacing: 0.15em; margin-bottom: 8px; }
    .project-name { color: #ddd; margin-bottom: 7px; font-size: 0.92rem; letter-spacing: 0.04em; }
    .project-desc { color: #666; font-size: 0.84rem; line-height: 1.9; }
    .project-tags { margin-top: 10px; color: #444; font-size: 0.65rem; letter-spacing: 0.15em; }

    /* Contact */
    .contact-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
    }
    .contact-label { color: #555; font-size: 0.72rem; letter-spacing: 0.2em; }
    .contact-val { color: #999; font-size: 0.86rem; }
    .contact-val a { color: #999; text-decoration: none; transition: color 0.2s; }
    .contact-val a:hover { color: #fff; }
  </style>
</head>
<body>

<div id="frame"></div>

<div class="hud" id="hud-tl">SYS // ONLINE<br>3 NODES ACTIVE</div>
<div class="hud" id="hud-tr">PORTFOLIO // v1.0<br>2026</div>
<div class="hud" id="hud-bl">CAM // <span id="cam-x">+0.00</span> <span id="cam-y">+0.00</span></div>
<div class="hud" id="hud-br">INTERACTIVE<br>ENVIRONMENT</div>

<div id="hero">
  <h1>SWARUP PANDA</h1>
  <p>DEVOPS &nbsp;·&nbsp; CLOUD &nbsp;·&nbsp; FULL STACK</p>
</div>

<div id="hint">HOVER &amp; CLICK TO EXPLORE</div>

<div id="labels"></div>

<div id="target">
  <div class="brk brk-tl"></div>
  <div class="brk brk-tr"></div>
  <div class="brk brk-bl"></div>
  <div class="brk brk-br"></div>
  <div id="target-lbl">SELECT</div>
</div>

<div id="panel">
  <div id="panel-accent"></div>
  <span id="close-btn">ESC</span>
  <div id="panel-title"></div>
  <div id="panel-body"></div>
</div>

<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ── Renderer ──────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000);
document.body.prepend(renderer.domElement);

// ── Scene / Camera ────────────────────────────────────────
const scene  = new THREE.Scene();
scene.fog    = new THREE.FogExp2(0x000000, 0.042);
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 0.3, 9);

// ── Lights ────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.08));

const sunLight = new THREE.DirectionalLight(0xfff5d0, 1.1);
sunLight.position.set(4, 8, 5);
scene.add(sunLight);

// ── Sun visual ────────────────────────────────────────────
const sunSphere = new THREE.Mesh(
  new THREE.SphereGeometry(0.55, 32, 32),
  new THREE.ShaderMaterial({
    fog: false,
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vViewDir;
      void main() {
        vNormal  = normalize(normalMatrix * normal);
        vec4 mv  = modelViewMatrix * vec4(position, 1.0);
        vViewDir = normalize(-mv.xyz);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying vec3 vNormal;
      varying vec3 vViewDir;
      void main() {
        float d   = clamp(dot(vNormal, vViewDir), 0.0, 1.0);
        vec3 core = vec3(1.00, 0.98, 0.88); // bright white-yellow centre
        vec3 mid  = vec3(1.00, 0.70, 0.08); // orange-yellow
        vec3 limb = vec3(0.82, 0.16, 0.02); // deep red at edge
        vec3 col  = d > 0.5
          ? mix(mid,  core, (d - 0.5) * 2.0)
          : mix(limb, mid,  d * 2.0);
        gl_FragColor = vec4(col, 1.0);
      }
    `,
  })
);
scene.add(sunSphere);
// Halo layers — colour shifts from yellow-orange outward to deep red
[
  { r: 1.8, color: 0xffcc33, op: 0.09 },
  { r: 2.8, color: 0xff7700, op: 0.05 },
  { r: 4.5, color: 0xff2200, op: 0.02 },
].forEach(({ r, color, op }) => {
  sunSphere.add(new THREE.Mesh(
    new THREE.SphereGeometry(r, 12, 12),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: op, fog: false })
  ));
});

// Per-section accent lights — positioned later
const ACCENT_COLORS = [0xff99aa, 0xaaccff, 0x2db87a];
const accentLights  = ACCENT_COLORS.map(c => {
  const l = new THREE.PointLight(c, 0.5, 10);
  scene.add(l);
  return l;
});

// ── Grid ──────────────────────────────────────────────────
const gridHelper = new THREE.GridHelper(80, 80, 0x0c0c0c, 0x0c0c0c);
gridHelper.position.y = -3.4;
scene.add(gridHelper);

// ── Section definitions ───────────────────────────────────
const SECTIONS = [
  {
    label:    'SKILLS',
    geo:      new THREE.IcosahedronGeometry(0.92, 2),
    pos:      [-4.0, 0, 0],
    rSpeed:   [0.002, 0.003],
    ringCol:  0xff99aa,
    panel:    buildSkills,
  },
  {
    label:    'PROJECTS',
    geo:      new THREE.OctahedronGeometry(0.92, 2),
    pos:      [0, 0, 0],
    rSpeed:   [0.0025, 0.002],
    ringCol:  0xaaccff,
    panel:    buildProjects,
  },
  {
    label:    'CONTACT',
    geo:      new THREE.TorusGeometry(0.62, 0.21, 7, 14),
    pos:      [4.0, 0, 0],
    rSpeed:   [0.0015, 0.0035],
    ringCol:  0x2db87a,
    panel:    buildContact,
  },
];

// ── Main meshes ───────────────────────────────────────────
const meshes = SECTIONS.map((s, i) => {
  const mat  = new THREE.MeshStandardMaterial({
    color:       s.ringCol,
    wireframe:   true,
    transparent: true,
    opacity:     0,
  });
  const mesh = new THREE.Mesh(s.geo, mat);
  mesh.position.set(...s.pos);
  mesh.userData.section = s;
  mesh.userData.idx     = i;
  scene.add(mesh);

  // Glow layer — slightly larger copy to simulate line thickness
  const glowMat = new THREE.MeshStandardMaterial({
    color: s.ringCol, wireframe: true, transparent: true, opacity: 0,
  });
  const glow = new THREE.Mesh(s.geo, glowMat);
  glow.scale.setScalar(1.045);
  mesh.add(glow);
  mesh.userData.glowMat = glowMat;

  // place accent light at this node
  accentLights[i].position.set(...s.pos);

  return mesh;
});

// ── Inner detail shapes (Skills & Projects only) ──────────
const innerShapes = [
  new THREE.IcosahedronGeometry(0.48, 0),
  new THREE.OctahedronGeometry(0.48, 0),
].map((geo, i) => {
  const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
    color:       SECTIONS[i].ringCol,
    wireframe:   true,
    transparent: true,
    opacity:     0.18,
  }));
  mesh.position.set(...SECTIONS[i].pos);
  scene.add(mesh);
  return mesh;
});

// ── Orbit rings ───────────────────────────────────────────
SECTIONS.forEach(s => {
  const mkRing = (radius, tube, rotX, rotZ, opacity) => {
    const m = new THREE.Mesh(
      new THREE.TorusGeometry(radius, tube, 4, 56),
      new THREE.MeshBasicMaterial({ color: s.ringCol, transparent: true, opacity })
    );
    m.position.set(...s.pos);
    m.rotation.x = rotX;
    m.rotation.z = rotZ;
    scene.add(m);
    return m;
  };
  s.rings = [
    mkRing(1.52, 0.006, Math.PI * 0.35, 0,            0.13),
    mkRing(1.72, 0.005, 0,              Math.PI * 0.2, 0.09),
  ];
});

// ── Mini satellites ───────────────────────────────────────
const satellites = [];
SECTIONS.forEach(s => {
  for (let j = 0; j < 3; j++) {
    const sat = new THREE.Mesh(
      new THREE.IcosahedronGeometry(0.07, 0),
      new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.45 })
    );

    // Random orbital plane via two perpendicular basis vectors
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const u1 = new THREE.Vector3(
      Math.sin(phi) * Math.cos(theta),
      Math.sin(phi) * Math.sin(theta),
      Math.cos(phi)
    ).normalize();
    const ref = Math.abs(u1.y) < 0.9
      ? new THREE.Vector3(0, 1, 0)
      : new THREE.Vector3(1, 0, 0);
    const u2 = new THREE.Vector3().crossVectors(u1, ref).normalize();

    sat.userData = {
      center: new THREE.Vector3(...s.pos),
      angle:  Math.random() * Math.PI * 2,
      r:      1.4 + Math.random() * 0.7,
      speed:  (0.18 + Math.random() * 0.38) * (Math.random() < 0.5 ? 1 : -1),
      u1, u2,
    };
    scene.add(sat);
    satellites.push(sat);
  }
});

// ── Connection line ───────────────────────────────────────
const lineGeo = new THREE.BufferGeometry().setFromPoints(
  SECTIONS.map(s => new THREE.Vector3(...s.pos))
);
scene.add(new THREE.Line(lineGeo,
  new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.04 })
));

// ── Particles ─────────────────────────────────────────────
const pArr = new Float32Array(1600 * 3);
for (let i = 0; i < pArr.length; i++) pArr[i] = (Math.random() - 0.5) * 55;
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pArr, 3));
scene.add(new THREE.Points(pGeo,
  new THREE.PointsMaterial({ color: 0xffffff, size: 0.022, transparent: true, opacity: 0.28 })
));

// ── Stars (background, fog-independent) ───────────────────
const starLayers = [
  { count: 2500, size: 1.4, baseOp: 0.72, speed: 0.35, phase: 0.00 },
  { count: 1200, size: 0.9, baseOp: 0.50, speed: 0.65, phase: 2.09 },
  { count:  600, size: 1.8, baseOp: 0.82, speed: 0.22, phase: 4.19 },
];
const starMats = starLayers.map(sl => {
  const arr = new Float32Array(sl.count * 3);
  for (let i = 0; i < sl.count; i++) {
    const theta        = Math.random() * Math.PI * 2;
    const phi          = Math.acos(2 * Math.random() - 1);
    const r            = 110 + Math.random() * 60;
    arr[i * 3]         = r * Math.sin(phi) * Math.cos(theta);
    arr[i * 3 + 1]     = r * Math.sin(phi) * Math.sin(theta);
    arr[i * 3 + 2]     = r * Math.cos(phi);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(arr, 3));
  const mat = new THREE.PointsMaterial({
    color:           0xffffff,
    size:            sl.size,
    sizeAttenuation: false,
    transparent:     true,
    opacity:         sl.baseOp,
    fog:             false,
  });
  scene.add(new THREE.Points(geo, mat));
  return { mat, baseOp: sl.baseOp, speed: sl.speed, phase: sl.phase };
});

// ── Space features ────────────────────────────────────────
// Helper: random point on the background sphere
function rndBgPos(rMin = 108, rMax = 158) {
  const th = Math.random() * Math.PI * 2;
  const ph = Math.acos(2 * Math.random() - 1);
  const r  = rMin + Math.random() * (rMax - rMin);
  return new THREE.Vector3(
    r * Math.sin(ph) * Math.cos(th),
    r * Math.sin(ph) * Math.sin(th),
    r * Math.cos(ph)
  );
}
// Helper: random perpendicular basis for a plane
function rndBasis() {
  const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
  const u1 = new THREE.Vector3(Math.sin(ph)*Math.cos(th), Math.sin(ph)*Math.sin(th), Math.cos(ph)).normalize();
  const ref = Math.abs(u1.y) < 0.9 ? new THREE.Vector3(0,1,0) : new THREE.Vector3(1,0,0);
  const u2 = new THREE.Vector3().crossVectors(u1, ref).normalize();
  const u3 = new THREE.Vector3().crossVectors(u1, u2).normalize();
  return { u1, u2, u3 };
}

// — Star clusters (globular, warm yellow-white) —
for (let c = 0; c < 4; c++) {
  const cen   = rndBgPos();
  const count = 70 + Math.floor(Math.random() * 60);
  const arr   = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const sp = 1.5 + Math.random() * 2.5;
    const u  = (Math.random()-0.5)*sp, v = (Math.random()-0.5)*sp, w = (Math.random()-0.5)*sp*0.6;
    arr[i*3] = cen.x+u; arr[i*3+1] = cen.y+v; arr[i*3+2] = cen.z+w;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({
    color: 0xfff5cc, size: 1.6, sizeAttenuation: false,
    transparent: true, opacity: 0.72, fog: false,
  })));
}

// — Spiral galaxies (blue-purple tint) —
for (let g = 0; g < 2; g++) {
  const cen   = rndBgPos();
  const { u1, u2, u3 } = rndBasis();
  const count = 140;
  const arr   = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const arm   = (i % 2) * Math.PI;
    const t     = (i / count) * Math.PI * 3.5;
    const rad   = 0.6 + t * 0.45;
    const sc    = (Math.random()-0.5)*0.9;
    const x     = Math.cos(t+arm)*rad + sc;
    const y     = (Math.random()-0.5)*0.25;
    const z     = Math.sin(t+arm)*rad + sc;
    arr[i*3]   = cen.x + u1.x*x + u3.x*y + u2.x*z;
    arr[i*3+1] = cen.y + u1.y*x + u3.y*y + u2.y*z;
    arr[i*3+2] = cen.z + u1.z*x + u3.z*y + u2.z*z;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(arr, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    color: new THREE.Color().setHSL(0.63 + Math.random()*0.08, 0.55, 0.78),
    size: 1.3, sizeAttenuation: false,
    transparent: true, opacity: 0.55, fog: false,
  })));
}

// — Nebulae — spread evenly across the visible front hemisphere ——
// Camera looks toward -Z; theta spreads around screen, phi keeps within FOV
const nebulaPalette = [0x9966ff, 0xff5599, 0x44aaff, 0xff8844, 0xcc44ff];
for (let n = 0; n < 5; n++) {
  const th  = (n / 5) * Math.PI * 2 + (Math.random() - 0.5) * 0.6;
  const ph  = 0.18 + Math.random() * 0.52; // 10°–40° from screen centre
  const r   = 115 + Math.random() * 28;
  const cen = new THREE.Vector3(
    r * Math.sin(ph) * Math.cos(th),
    r * Math.sin(ph) * Math.sin(th),
    -r * Math.cos(ph)              // negative Z always faces the camera
  );
  const { u1, u2, u3 } = rndBasis();
  const pillar = Math.random() > 0.4;
  // Two layers: tight core + wide soft halo
  [ { count: 160, sx: pillar?2:5,  sy: pillar?8:4,   sz: pillar?2:5,  size: 2.8, op: 0.16 },
    { count: 100, sx: pillar?4:9,  sy: pillar?14:7,  sz: pillar?4:8,  size: 4.5, op: 0.07 },
  ].forEach(({ count, sx, sy, sz, size, op }) => {
    const arr = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      const x = (Math.random()-0.5) * sx;
      const y = (Math.random()-0.5) * sy;
      const z = (Math.random()-0.5) * sz;
      arr[i*3]   = cen.x + u1.x*x + u3.x*y + u2.x*z;
      arr[i*3+1] = cen.y + u1.y*x + u3.y*y + u2.y*z;
      arr[i*3+2] = cen.z + u1.z*x + u3.z*y + u2.z*z;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(arr, 3));
    scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
      color: nebulaPalette[n % nebulaPalette.length],
      size, sizeAttenuation: false,
      transparent: true, opacity: op, fog: false,
    })));
  });
}

// — Milky Way band (faint dense strip of stars) —
{

// ── Shooting stars ────────────────────────────────────────
const shootingStars = Array.from({ length: 6 }, (_, i) => {
  const pos = new Float32Array(6);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat  = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, fog: false });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  return { line, geo, mat, active: false, timer: 4 + i * 2.5, progress: 0, pos: new THREE.Vector3(), dir: new THREE.Vector3(), speed: 0, len: 0 };
});

function spawnShootingStar(ss) {
  const th = Math.random() * Math.PI * 2;
  const ph = Math.acos(2 * Math.random() - 1);
  const r  = 120;
  ss.pos.set(r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph));
  const radial = ss.pos.clone().normalize();
  const rand   = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5);
  ss.dir = rand.sub(radial.clone().multiplyScalar(rand.dot(radial))).normalize();
  ss.speed    = 18 + Math.random() * 22;
  ss.len      = 5  + Math.random() * 8;
  ss.progress = 0;
  ss.active   = true;
}

// ── Mouse / Raycaster ─────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2(-9999, -9999);
let camTargetX  = 0;
let camTargetY  = 0;
let hoveredMesh = null;

renderer.domElement.addEventListener('mousemove', e => {
  mouse.x    =  (e.clientX / innerWidth)  * 2 - 1;
  mouse.y    = -(e.clientY / innerHeight) * 2 + 1;
  camTargetX =  (e.clientX / innerWidth  - 0.5) * 2.6;
  camTargetY = -(e.clientY / innerHeight - 0.5) * 1.6;
});

// ── Helpers ───────────────────────────────────────────────
const _sv = new THREE.Vector3();
function toScreen(pos3d) {
  _sv.copy(pos3d).project(camera);
  return {
    x: ( _sv.x * 0.5 + 0.5) * innerWidth,
    y: (-_sv.y * 0.5 + 0.5) * innerHeight,
  };
}

// ── Intro fade-in ─────────────────────────────────────────
document.getElementById('hero').classList.add('visible');

meshes.forEach((m, i) => {
  setTimeout(() => {
    const t0 = performance.now();
    (function fade() {
      const p = Math.min((performance.now() - t0) / 900, 1);
      m.material.opacity          = p * 0.75;
      m.userData.glowMat.opacity  = p * 0.32;
      if (p < 1) requestAnimationFrame(fade);
    })();
  }, 200 + i * 220);
});

// ── Animate ───────────────────────────────────────────────
let  t       = 0;
const scaleV = new THREE.Vector3();

function tick() {
  requestAnimationFrame(tick);
  t += 0.008;

  // Orbit sun
  const sa = t * 0.09;
  sunSphere.position.set(
    Math.cos(sa) * 42,
    18 + Math.sin(t * 0.06) * 7,
    Math.sin(sa) * 42
  );
  sunLight.position.copy(sunSphere.position);

  // Shooting stars
  shootingStars.forEach(ss => {
    if (!ss.active) {
      ss.timer -= 0.008;
      if (ss.timer <= 0) { spawnShootingStar(ss); ss.timer = 10 + Math.random() * 18; }
    } else {
      ss.progress += ss.speed * 0.008;
      const head = ss.pos.clone().addScaledVector(ss.dir, ss.progress);
      const tail = ss.pos.clone().addScaledVector(ss.dir, Math.max(0, ss.progress - ss.len));
      const p = ss.geo.attributes.position.array;
      p[0]=tail.x; p[1]=tail.y; p[2]=tail.z;
      p[3]=head.x; p[4]=head.y; p[5]=head.z;
      ss.geo.attributes.position.needsUpdate = true;
      const life = ss.progress / (ss.len + ss.speed * 0.6);
      ss.mat.opacity = Math.sin(Math.min(life, 1) * Math.PI) * 0.92;
      if (ss.progress > ss.len + ss.speed * 0.6) { ss.active = false; ss.mat.opacity = 0; }
    }
  });

  // Twinkle stars
  starMats.forEach(s => {
    s.mat.opacity = s.baseOp + Math.sin(t * s.speed + s.phase) * 0.13;
  });

  // Camera parallax + bob
  const bobY = Math.sin(t * 0.4) * 0.14;
  camera.position.x += (camTargetX      - camera.position.x) * 0.04;
  camera.position.y += (camTargetY * 0.55 + bobY - camera.position.y) * 0.04;
  camera.lookAt(0, 0, 0);

  // HUD coords
  camXEl.textContent = (camera.position.x >= 0 ? '+' : '') + camera.position.x.toFixed(2);
  camYEl.textContent = (camera.position.y >= 0 ? '+' : '') + camera.position.y.toFixed(2);

  // Rotate main meshes
  meshes.forEach((m, i) => {
    m.rotation.x += SECTIONS[i].rSpeed[0];
    m.rotation.y += SECTIONS[i].rSpeed[1];
  });

  // Animate rings
  SECTIONS.forEach(s => {
    s.rings[0].rotation.z += 0.006;
    s.rings[1].rotation.x += 0.004;
  });

  // Counter-rotate inner shapes
  innerShapes[0].rotation.x -= 0.003;
  innerShapes[0].rotation.y -= 0.005;
  innerShapes[1].rotation.x -= 0.004;
  innerShapes[1].rotation.y -= 0.003;

  // Animate satellites
  satellites.forEach(sat => {
    const u = sat.userData;
    u.angle += u.speed * 0.004;
    const c = Math.cos(u.angle), s = Math.sin(u.angle);
    sat.position.set(
      u.center.x + (c * u.u1.x + s * u.u2.x) * u.r,
      u.center.y + (c * u.u1.y + s * u.u2.y) * u.r,
      u.center.z + (c * u.u1.z + s * u.u2.z) * u.r,
    );
    sat.rotation.y += 0.006;
  });

  // Raycasting — explicit false prevents recursive child hits
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(meshes, false);

  // Reset inner shapes
  innerShapes.forEach(s => { s.material.opacity = 0.18; });

  // Reset states
  meshes.forEach((m, i) => {
    m.material.opacity         = 0.75;
    m.userData.glowMat.opacity = 0.32;
    scaleV.setScalar(1);
    m.scale.lerp(scaleV, 0.09);
    labelEls[i].classList.remove('active');
    SECTIONS[i].rings.forEach(r => r.material.opacity > 0.04
      ? (r.material.opacity -= 0.01) : 0);
    accentLights[i].intensity = 0.3;
  });

  hoveredMesh = null;
  if (!panelOpen && hits.length) {
    const hit = hits[0].object;
    if (hit.userData.idx != null) {
      hoveredMesh = hit;
      const idx   = hoveredMesh.userData.idx;
      hoveredMesh.material.opacity         = 0.97;
      hoveredMesh.userData.glowMat.opacity = 0.55;
      scaleV.setScalar(1.11);
      hoveredMesh.scale.lerp(scaleV, 0.1);
      labelEls[idx].classList.add('active');
      SECTIONS[idx].rings.forEach(r => { r.material.opacity = 0.28; });
      accentLights[idx].intensity = 1.6;
      if (idx < 2) innerShapes[idx].material.opacity = 0.82;
    }
  }

  renderer.domElement.style.cursor = hoveredMesh ? 'pointer' : 'default';

  // Label positions
  meshes.forEach((m, i) => {
    const wp = m.position.clone();
    wp.y -= 1.55;
    const sp = toScreen(wp);
    labelEls[i].style.left = sp.x + 'px';
    labelEls[i].style.top  = sp.y + 'px';
  });

  // Targeting brackets
  if (hoveredMesh && !panelOpen) {
    const sp   = toScreen(hoveredMesh.position);
    const size = 108;
    targetEl.style.left         = (sp.x - size / 2) + 'px';
    targetEl.style.top          = (sp.y - size / 2) + 'px';
    targetEl.style.width        = size + 'px';
    targetEl.style.height       = size + 'px';
    targetLbl.textContent       = hoveredMesh.userData.section.label;
    targetEl.classList.add('show');
  } else {
    targetEl.classList.remove('show');
  }

  renderer.render(scene, camera);
}
tick();

// ── Resize ────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
